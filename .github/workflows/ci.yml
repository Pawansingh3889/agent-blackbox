name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Tests
        run: python -m pytest -q
      - name: Self-check (the tool verifies itself)
        run: |
          python -c "from agent_blackbox import Ledger; l=Ledger('ci.db'); [l.record('ci','tool_call',payload={'i':i}) for i in range(50)]"
          python -m agent_blackbox.cli verify --db ci.db
